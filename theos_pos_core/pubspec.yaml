name: theos_pos_core
description: Core data layer for Theos POS - Odoo 18/19 offline-first. Pure Dart package with models, managers, database, and services.
version: 1.0.0
publish_to: 'none'

environment:
  sdk: ^3.10.0

dependencies:
  # Database (Drift - Dart puro)
  drift: ^2.20.3
  path: ^1.9.0

  # Serialización (Dart puro)
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Utilidades (Dart puro)
  uuid: ^4.5.2
  intl: ^0.20.2
  dartz: ^0.10.1
  collection: ^1.18.0

  # Paquete unificado Odoo SDK
  odoo_sdk:
    path: ../odoo_sdk

dev_dependencies:
  build_runner: ^2.10.5
  drift_dev: ^2.20.3
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  test: ^1.24.0
  mocktail: ^1.0.0
