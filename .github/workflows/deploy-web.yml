name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies (all packages)
        run: |
          cd odoo_sdk && dart pub get && cd ..
          cd flutter_qweb && flutter pub get && cd ..
          cd odoo_widgets && flutter pub get && cd ..
          cd theos_pos_core && flutter pub get && cd ..
          cd theos_pos && flutter pub get && cd ..

      - name: Generate code (theos_pos_core)
        working-directory: theos_pos_core
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate code (theos_pos)
        working-directory: theos_pos
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build web
        working-directory: theos_pos
        run: flutter build web --release --base-href /theos_app/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: theos_pos/build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
